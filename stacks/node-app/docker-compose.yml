version: '3.8'
services:
  web-app:
    image: node:20-alpine
    container_name: stackops-web-app
    restart: always
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "npm install && npm run start"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://cache-redis:6379
    expose:
      - "3000"
    networks:
      - stackops-network
    depends_on:
      - cache-redis
  cache-redis:
    image: redis:7-alpine
    container_name: stackops-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - stackops-network
networks:
  stackops-network:
    external: true
    name: stackops-network
volumes:
  redis_data:
